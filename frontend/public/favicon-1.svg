  <line x1="18" y1="39" x2="26" y2="37.5" stroke="#0F172A" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="46" y1="36" x2="38" y2="36" stroke="#0F172A" stroke-width="1.4" stroke-linecap="round"/>
